<!DOCTYPE html> 
<html lang="en">
    <head>
      <title>Exercise 2</title>
      <meta charset="UTF-8">
    </head>
    <style>
        header,footer {   
            background-color: gray;
            color:white;
            padding:2px;
        }
        nav { 
            background-color: black;
        }
        nav a{
            color:aliceblue;
            padding: 10px;
            font-size: 20px;
        }
        header, nav, footer,section{
            text-align:center;
        }
        section {
            background-color: lightcyan;
            border: 2px solid grey;
            text-align: left;
            width: 30%;
            height: 200px;
            display: inline-block;
        }
        main{
            background-color: whitesmoke;
            color:black;
            width: 100%;
            height: 600px;
        }
        #welcomeBanner {
            background-color: blue;
        }
        i {
            color: white;
        }
        .highlight {
            background-color: lightblue;
        }

    </style>
    <body>
        <header><h1>Exercise2</h1></header>
        <nav>
            <a href="#home">Home</a>
            <a href="#events">Events</a>
            <a href="#contact">Contact</a>
            <a href="help.html" target="_blank">Help</a>
        </nav>
        <main>
            <section id="home">Home</section>
            <section id="events">Events</section>
            <section id="contact">Contact</section>
            <div id="welcomeBanner">
                <h1><i>Welcome User</i></h1>
            </div>
            <div>
                <h3 class="highlight">
                    <span style="color:red; font:bold;">Special Offer:</span>
                </h3>
                <p>20% off on new events in the summer</p>
            </div>
        </main>
        <footer>&copy; All rights are reserved.</footer>
    </body>
</html>
