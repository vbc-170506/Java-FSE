<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
  </head>
  <body>
    <!--quotes can be single or double similar to python-->
    <p title='John "ShotGun" Nelson'>hi</p>
    <p title="John 'ShotGun' Nelson">hi</p>
    <!--html headings has default size. we can still change-->
    <!--them using font-size attribute-->
    <h1 font-size="60">JOke</h1>
    <!--HTML PARAGRAPHS-->
    <p>hi              hello</p>
    <!--HORIZONTAL RULES-->
    <P>displays horizontal line</P>

    <p style="background-color:powderblue; color:white;
    font-family:courier; font-size:20px; text-align: center;">
      vishu</p>
    
  </body>
